name: CI Pipeline with Auto Versioning

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: terraform-ecr

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Generate version
      id: version
      run: |
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
        echo "Last tag: $LAST_TAG"
        
        # vX.0 포맷에서 MAJOR 추출
        VERSION=${LAST_TAG#v}
        MAJOR=${VERSION%%.*}
        
        # MAJOR +1
        NEW_MAJOR=$((MAJOR + 1))
        NEW_VERSION="v${NEW_MAJOR}.0"
        echo "New version: $NEW_VERSION"
        
        echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "version_number=${NEW_MAJOR}.0" >> $GITHUB_OUTPUT
    
    - name: Create Git tag
      if: github.ref == 'refs/heads/main'
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git tag ${{ steps.version.outputs.version }}
        git push origin ${{ steps.version.outputs.version }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1
    
    - name: Build and push Docker image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$VERSION
        
        echo "Building Docker image with version: $VERSION"
        docker build -t $IMAGE_URI .
        
        # 기존 이미지 삭제
        aws ecr batch-delete-image \
          --repository-name $ECR_REPOSITORY \
          --image-ids imageTag=$VERSION \
          --region $AWS_REGION || true
        
        echo "Pushing image: $IMAGE_URI"
        docker push $IMAGE_URI
        
        # latest 태그
        docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
        aws ecr batch-delete-image \
          --repository-name $ECR_REPOSITORY \
          --image-ids imageTag=latest \
          --region $AWS_REGION || true
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        echo "Image pushed with version: $VERSION"
    
    # 파일명 수정: nginx-deploy.yaml
    - name: Update Kubernetes Deployment
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        echo "Updating nginx-deploy.yaml with version: $VERSION"
        
        # 파일 존재 확인
        if [ ! -f "manifests/nginx-app/nginx-deploy.yaml" ]; then
          echo "nginx-deploy.yaml not found!"
          ls -la manifests/nginx-app/
          exit 1
        fi
        
        # 이미지 태그 업데이트
        sed -i "s|image:.*$ECR_REPOSITORY:.*|image: $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION|g" manifests/nginx-app/nginx-deploy.yaml
        
        echo "Updated image in nginx-deploy.yaml:"
        cat manifests/nginx-app/nginx-deploy.yaml | grep "image:"
    
    - name: Commit and push updated manifest
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        
        git add manifests/nginx-app/nginx-deploy.yaml
        
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update deployment to version ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main
          echo "Pushed updated manifest"
        fi
    
    - name: Print result
      run: |
        echo "=========================================="
        echo "CI/CD Pipeline Success!"
        echo "=========================================="
        echo "Version: ${{ steps.version.outputs.version }}"
        echo "Image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.version.outputs.version }}"
        echo "Kubernetes manifest updated: manifests/nginx-app/nginx-deploy.yaml"
        echo "ArgoCD will auto-sync the changes"
        echo "=========================================="
